<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>BIDI Runtime Replay</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d7dce3;
      --surface: #ffffff;
      --page: #f5f7fa;
      --flow: #0f766e;
      --commit: #2563eb;
      --hold: #b91c1c;
      --nest: #7c3aed;
      --trace: #ea580c;
      --bridge: #0f5132;
      --shadow: 0 18px 40px rgba(17, 24, 39, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--ink);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 22px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .route {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0;
    }

    .build {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--surface);
      white-space: nowrap;
    }

    .pipeline {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.05fr 1.1fr 0.9fr 0.9fr 1.2fr;
      gap: 12px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel h2 {
      margin: 0;
      padding: 13px 14px;
      font-size: 14px;
      line-height: 1;
      letter-spacing: 0;
      border-bottom: 1px solid var(--line);
    }

    .panel[data-tone="flow"] h2 {
      color: var(--flow);
    }

    .panel[data-tone="commit"] h2 {
      color: var(--commit);
    }

    .panel[data-tone="nest"] h2 {
      color: var(--nest);
    }

    .panel[data-tone="trace"] h2 {
      color: var(--trace);
    }

    .panel[data-tone="bridge"] h2 {
      color: var(--bridge);
    }

    .body {
      min-height: 0;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .field {
      position: relative;
      min-height: 168px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent),
        linear-gradient(180deg, rgba(37, 99, 235, 0.06), transparent);
      overflow: hidden;
    }

    .cell {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 2px solid currentColor;
      background: #fff;
      font-weight: 700;
      font-size: 18px;
      line-height: 1;
    }

    .cell small {
      position: absolute;
      top: 58px;
      width: 86px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    .cell.a {
      color: var(--flow);
      left: 18px;
      top: 32px;
    }

    .cell.b {
      color: var(--commit);
      left: calc(50% - 26px);
      top: 78px;
      animation: phasePulse 1800ms ease-in-out infinite;
    }

    .cell.c {
      color: var(--hold);
      right: 18px;
      top: 32px;
    }

    .channel {
      position: absolute;
      left: 54px;
      right: calc(50% - 2px);
      top: 67px;
      height: 3px;
      background: var(--flow);
      transform: rotate(18deg);
      transform-origin: left center;
    }

    .channel::after {
      content: "";
      position: absolute;
      right: -1px;
      top: -5px;
      width: 0;
      height: 0;
      border-left: 11px solid var(--flow);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    @keyframes phasePulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.25);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(37, 99, 235, 0.00);
      }
    }

    .metric-row {
      display: grid;
      grid-template-columns: minmax(76px, 1fr) auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .metric-row strong {
      color: var(--ink);
      font-size: 18px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .commit-stack {
      display: grid;
      gap: 10px;
    }

    .commit-line {
      border-left: 4px solid var(--commit);
      padding: 9px 10px;
      background: #f8fafc;
    }

    .commit-line.held {
      border-left-color: var(--hold);
    }

    .trits {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 7px;
    }

    .trit {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-weight: 800;
      font-size: 18px;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .status span {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 7px;
      background: #fff;
    }

    .status .accepted {
      color: var(--commit);
      border-color: rgba(37, 99, 235, 0.35);
    }

    .status .held {
      color: var(--hold);
      border-color: rgba(185, 28, 28, 0.35);
    }

    .nest-lines {
      display: grid;
      gap: 12px;
      align-content: center;
      min-height: 168px;
    }

    .scale {
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .bar {
      height: 11px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 66.6667%;
      background: var(--nest);
    }

    .trace-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(28px, 1fr));
      gap: 6px;
      align-content: center;
      min-height: 168px;
    }

    .trace-cell {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--trace);
      font-size: 22px;
      font-weight: 800;
    }

    .bridge-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(18px, 1fr));
      gap: 4px;
      min-height: 168px;
      align-content: center;
    }

    .bridge-cell {
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }

    .bridge-cell.active {
      border-color: var(--bridge);
      background: #dcfce7;
      box-shadow: inset 0 0 0 2px var(--bridge);
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--ink);
    }

    @media (max-width: 1100px) {
      .pipeline {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel[data-tone="bridge"] {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 14px;
      }

      header {
        align-items: start;
        flex-direction: column;
      }

      .build {
        justify-content: flex-start;
      }

      .pipeline {
        grid-template-columns: 1fr;
      }

      .panel[data-tone="bridge"] {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>BIDI Runtime Replay</h1>
        <div class="route">Flow -> Commit -> Nest -> Trace -> Bridge</div>
      </div>
      <div class="build" aria-label="replay source">
        <span class="pill">native_reducer.cdc</span>
        <span class="pill">native_surface.cdc</span>
        <span class="pill">bridge64.cdc</span>
      </div>
    </header>

    <section class="pipeline" aria-label="runtime replay">
      <article class="panel" data-tone="flow">
        <h2>Flow</h2>
        <div class="body">
          <div class="field" aria-label="phase field">
            <div class="channel" aria-hidden="true"></div>
            <div class="cell a">0<small>council.a</small></div>
            <div class="cell b">+<small>council.b</small></div>
            <div class="cell c">-<small>council.c</small></div>
          </div>
          <div class="metric-row"><span>theta council.b</span><strong id="flow-theta"></strong></div>
          <div class="metric-row"><span>channel weight</span><strong id="flow-weight"></strong></div>
        </div>
      </article>

      <article class="panel" data-tone="commit">
        <h2>Commit</h2>
        <div class="body">
          <div class="commit-stack">
            <div class="commit-line">
              <div class="trits" id="commit-trits"></div>
              <div class="status" id="commit-status"></div>
            </div>
            <div class="commit-line held">
              <div class="trits" id="hold-trits"></div>
              <div class="status" id="hold-status"></div>
            </div>
          </div>
          <footer><span>accepted</span><span>held</span></footer>
        </div>
      </article>

      <article class="panel" data-tone="nest">
        <h2>Nest</h2>
        <div class="body">
          <div class="nest-lines">
            <div class="scale">
              <span>parent</span>
              <div class="bar"><span></span></div>
              <strong id="parent-belief"></strong>
            </div>
            <div class="scale">
              <span>child</span>
              <div class="bar"><span></span></div>
              <strong id="child-prior"></strong>
            </div>
          </div>
          <footer><span>up</span><code id="nest-up"></code></footer>
        </div>
      </article>

      <article class="panel" data-tone="trace">
        <h2>Trace</h2>
        <div class="body">
          <div class="trace-strip" id="trace-strip"></div>
          <div class="metric-row"><span>events</span><strong id="trace-events"></strong></div>
        </div>
      </article>

      <article class="panel" data-tone="bridge">
        <h2>Bridge</h2>
        <div class="body">
          <div class="bridge-grid" id="bridge-grid" aria-label="64-state bridge grid"></div>
          <div class="metric-row"><span>dyadic</span><strong id="bridge-dyadic"></strong></div>
          <div class="metric-row"><span>triadic</span><strong id="bridge-triadic"></strong></div>
        </div>
      </article>
    </section>
  </main>

  <script type="application/json" id="replay-data">
{
  "flow": {
    "thetaCouncilB": "0.25",
    "thetaCouncilBRaw": "0.250000",
    "channelWeight": "0.25"
  },
  "commit": {
    "trits": "0+-",
    "balance": "admissible",
    "status": "accepted",
    "reason": "none"
  },
  "hold": {
    "trits": "-+0",
    "balance": "violated",
    "status": "held",
    "reason": "balance-violation"
  },
  "nest": {
    "up": "0.666667",
    "parentBelief": "0.666667",
    "childPrior": "0.666667"
  },
  "trace": {
    "trits": "+0-+0-",
    "events": "4"
  },
  "bridge": {
    "dyadic": "101101",
    "triadic": "231",
    "index": "45"
  }
}
  </script>
  <script>
    const replay = JSON.parse(document.getElementById("replay-data").textContent);

    function text(id, value) {
      document.getElementById(id).textContent = value;
    }

    function renderTrits(id, trits) {
      const el = document.getElementById(id);
      el.textContent = "";
      for (const trit of trits) {
        const span = document.createElement("span");
        span.className = "trit";
        span.textContent = trit;
        el.appendChild(span);
      }
    }

    function renderStatus(id, data) {
      const el = document.getElementById(id);
      el.textContent = "";
      for (const value of [data.balance, data.status, data.reason]) {
        const span = document.createElement("span");
        span.className = value === "accepted" ? "accepted" : value === "held" ? "held" : "";
        span.textContent = value;
        el.appendChild(span);
      }
    }

    function renderTrace() {
      const el = document.getElementById("trace-strip");
      el.textContent = "";
      for (const trit of replay.trace.trits) {
        const span = document.createElement("span");
        span.className = "trace-cell";
        span.textContent = trit;
        el.appendChild(span);
      }
    }

    function renderBridge() {
      const el = document.getElementById("bridge-grid");
      const active = Number(replay.bridge.index);
      el.textContent = "";
      for (let i = 0; i < 64; i += 1) {
        const span = document.createElement("span");
        span.className = i === active ? "bridge-cell active" : "bridge-cell";
        span.title = String(i);
        el.appendChild(span);
      }
    }

    text("flow-theta", replay.flow.thetaCouncilB);
    text("flow-weight", replay.flow.channelWeight);
    renderTrits("commit-trits", replay.commit.trits);
    renderStatus("commit-status", replay.commit);
    renderTrits("hold-trits", replay.hold.trits);
    renderStatus("hold-status", replay.hold);
    text("parent-belief", replay.nest.parentBelief);
    text("child-prior", replay.nest.childPrior);
    text("nest-up", replay.nest.up);
    renderTrace();
    text("trace-events", replay.trace.events);
    renderBridge();
    text("bridge-dyadic", replay.bridge.dyadic);
    text("bridge-triadic", replay.bridge.triadic);
  </script>
</body>
</html>
